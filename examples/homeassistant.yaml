# Home Assistant integration for parentald
#
# Prerequisites:
#   - parentald server running with --api-key / API_KEY set
#   - Add this to your HA configuration.yaml
#
# Replace:
#   - PARENTALD_URL with your server URL (e.g., http://192.168.1.10:8080)
#   - YOUR_API_KEY with the configured API key
#   - "carl" / "simo" with your actual usernames

# --- Sensors ---

rest:
  - resource: "PARENTALD_URL/api/status"
    headers:
      X-API-Key: "YOUR_API_KEY"
    scan_interval: 30
    sensor:
      - name: "Carl Status"
        value_template: "{{ value_json.carl.status | default('offline') }}"
        json_attributes_path: "$.carl"
        json_attributes:
          - hostname
          - lastSeen
      - name: "Simo Status"
        value_template: "{{ value_json.simo.status | default('offline') }}"
        json_attributes_path: "$.simo"
        json_attributes:
          - hostname
          - lastSeen

# --- Commands ---

rest_command:
  parentald_lock:
    url: "PARENTALD_URL/users/{{ user }}/lock"
    method: POST
    headers:
      X-API-Key: "YOUR_API_KEY"

  parentald_unlock:
    url: "PARENTALD_URL/users/{{ user }}/unlock"
    method: POST
    headers:
      X-API-Key: "YOUR_API_KEY"

  parentald_bonus:
    url: "PARENTALD_URL/users/{{ user }}/bonus"
    method: POST
    headers:
      X-API-Key: "YOUR_API_KEY"
      Content-Type: "application/x-www-form-urlencoded"
    payload: "minutes={{ minutes }}"

# --- Example automations ---

automation:
  - alias: "Benachrichtigung wenn Carl sich anmeldet"
    trigger:
      - platform: state
        entity_id: sensor.carl_status
        from: "offline"
        to: "online"
    action:
      - service: notify.mobile_app
        data:
          title: "parentald"
          message: "Carl hat sich angemeldet ({{ state_attr('sensor.carl_status', 'hostname') }})"

  - alias: "Benachrichtigung wenn Carl idle geht"
    trigger:
      - platform: state
        entity_id: sensor.carl_status
        to: "idle"
        for: "00:05:00"
    action:
      - service: notify.mobile_app
        data:
          title: "parentald"
          message: "Carl ist seit 5 Minuten inaktiv"

# --- Example scripts (for dashboard buttons) ---

script:
  lock_carl:
    alias: "Carl sperren"
    sequence:
      - service: rest_command.parentald_lock
        data:
          user: carl

  unlock_carl:
    alias: "Carl entsperren"
    sequence:
      - service: rest_command.parentald_unlock
        data:
          user: carl

  bonus_carl_15:
    alias: "Carl 15 Min Bonus"
    sequence:
      - service: rest_command.parentald_bonus
        data:
          user: carl
          minutes: 15
