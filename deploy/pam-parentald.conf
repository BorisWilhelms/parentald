# parentald: deny users listed in deny-users file
# Add this line to /etc/pam.d/gdm-password, /etc/pam.d/sddm, /etc/pam.d/login, etc.
# Place BEFORE pam_unix.so to block login before password prompt.
#
# onerr=succeed: if file is missing/unreadable, allow login (fail-open)
# sense=deny: users IN the file are denied
auth required pam_listfile.so onerr=succeed item=user sense=deny file=/etc/parentald/deny-users
