<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="auto">
{{template "head"}}
<body>
    <main class="container">
        {{template "nav" .}}

        <article>
            <header><strong>{{t .Lang "users.add"}}</strong></header>
            <form role="group" hx-post="/users" hx-target="#user-list" hx-swap="innerHTML">
                <input type="text" name="name" placeholder="{{t .Lang "users.placeholder"}}" required>
                <button type="submit">{{t .Lang "users.submit"}}</button>
            </form>
        </article>

        <div id="user-list">
            {{template "user_list.html" .}}
        </div>
    </main>
</body>
</html>
