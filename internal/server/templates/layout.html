{{define "head"}}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>parentald</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --pico-font-size: 92%;
            --pico-primary: #6366f1;
            --pico-primary-hover: #4f46e5;
            --pico-primary-focus: rgba(99, 102, 241, 0.25);
            --pico-primary-inverse: #fff;
        }
        [data-theme="dark"] {
            --pico-primary: #818cf8;
            --pico-primary-hover: #a5b4fc;
            --pico-primary-focus: rgba(129, 140, 248, 0.25);
        }
        nav {
            background: var(--pico-primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }
        nav a, nav strong { color: #fff !important; }
        nav a:hover { color: rgba(255,255,255,0.8) !important; }
        mark.locked { background: #fecaca; color: #991b1b; font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 4px; }
        mark.bonus { background: #bbf7d0; color: #166534; font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 4px; }
        .app-icon { width: 24px; height: 24px; vertical-align: middle; margin-right: 0.4rem; }
        .days-inline label { display: inline-block; margin-right: 0.75rem; }
        .days-inline input[type="checkbox"] { margin-right: 0.2rem; }
        article { background: var(--pico-card-background-color); border: 1px solid var(--pico-muted-border-color); }
        article header { background: color-mix(in srgb, var(--pico-primary) 8%, transparent); border-bottom: 2px solid var(--pico-primary); margin: -1rem -1rem 1rem -1rem; padding: 0.75rem 1rem; border-radius: 0.35rem 0.35rem 0 0; }
        details summary { font-weight: 600; }
        button.contrast { --pico-contrast: #dc2626; --pico-contrast-hover: #b91c1c; }
        .lang-switch { font-size: 0.75rem; opacity: 0.8; }
    </style>
</head>
{{end}}

{{define "nav"}}
<nav>
    <ul>
        <li><strong>parentald</strong></li>
    </ul>
    <ul>
        <li><a href="/">{{t .Lang "nav.users"}}</a></li>
        <li><a href="/activity">{{t .Lang "nav.activity"}}</a></li>
        <li><a href="/dashboard">{{t .Lang "nav.dashboard"}}</a></li>
        <li><a href="/logout">{{t .Lang "nav.logout"}}</a></li>
        <li>
            {{if eq .Lang "de"}}<a href="/lang/en" class="lang-switch">EN</a>
            {{else}}<a href="/lang/de" class="lang-switch">DE</a>{{end}}
        </li>
        <li><a href="#" onclick="toggleTheme()" id="theme-toggle">🌙</a></li>
    </ul>
</nav>
<script>
function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
}
(function() {
    const saved = localStorage.getItem('theme');
    if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        const el = document.getElementById('theme-toggle');
        if (el) el.textContent = saved === 'dark' ? '☀️' : '🌙';
    }
})();
</script>
{{end}}
