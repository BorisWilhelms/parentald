{{if .Data.User.Schedules}}
<table>
    <thead>
        <tr>
            <th>{{t .Lang "schedule.days"}}</th>
            <th>{{t .Lang "schedule.from"}}</th>
            <th>{{t .Lang "schedule.to"}}</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {{range $i, $s := .Data.User.Schedules}}
        <tr>
            <td>{{join $s.Days ", "}}</td>
            <td>{{$s.From}}</td>
            <td>{{$s.To}}</td>
            <td>
                <button class="outline secondary" style="width: auto; margin: 0; padding: 0.2rem 0.6rem;" hx-delete="/users/{{$.Data.Name}}/schedules/{{$i}}" hx-target="#schedules-{{$.Data.Name}}" hx-swap="innerHTML">{{t $.Lang "schedule.delete"}}</button>
            </td>
        </tr>
        {{end}}
    </tbody>
</table>
{{else}}
<p><small>{{t .Lang "schedule.none"}}</small></p>
{{end}}

<details>
    <summary role="button" class="outline">{{t .Lang "schedule.add"}}</summary>
    <form hx-post="/users/{{.Data.Name}}/schedules" hx-target="#schedules-{{.Data.Name}}" hx-swap="innerHTML" style="margin-top: 0.75rem;">
        <fieldset class="days-inline">
            <label><input type="checkbox" name="days" value="mon"> {{t .Lang "day.mon"}}</label>
            <label><input type="checkbox" name="days" value="tue"> {{t .Lang "day.tue"}}</label>
            <label><input type="checkbox" name="days" value="wed"> {{t .Lang "day.wed"}}</label>
            <label><input type="checkbox" name="days" value="thu"> {{t .Lang "day.thu"}}</label>
            <label><input type="checkbox" name="days" value="fri"> {{t .Lang "day.fri"}}</label>
            <label><input type="checkbox" name="days" value="sat"> {{t .Lang "day.sat"}}</label>
            <label><input type="checkbox" name="days" value="sun"> {{t .Lang "day.sun"}}</label>
        </fieldset>
        <div role="group">
            <input type="time" name="from" required>
            <span>—</span>
            <input type="time" name="to" required>
            <button type="submit">{{t .Lang "schedule.submit"}}</button>
        </div>
    </form>
</details>
